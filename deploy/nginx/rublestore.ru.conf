# RubleStore — reverse proxy (копировать в /etc/nginx/sites-available/rublestore.ru)
# Сайт и Payload CMS (/api) — контейнер web на 127.0.0.1:3001
# NestJS API (если нужен снаружи) — 127.0.0.1:4000, префикс /store-api/

upstream rublestore_web {
    server 127.0.0.1:3001;
}

upstream rublestore_api {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    listen [::]:80;
    server_name rublestore.ru www.rublestore.ru;

    # Let's Encrypt (certbot --nginx)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /store-api/ {
        proxy_pass http://rublestore_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://rublestore_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }
}
